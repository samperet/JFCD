<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JFCD - Secure group chat application">
    <meta name="theme-color" content="#007AFF">
    <title>JFCD</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23007AFF' width='192' height='192' rx='40'/><text x='50%' y='50%' font-size='100' font-weight='bold' dominant-baseline='middle' text-anchor='middle' fill='white'>J</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-header">
                <div class="app-icon">J</div>
                <h1>JFCD</h1>
                <p>Select a name to start</p>
            </div>
            <div class="user-grid">
                <button class="user-btn" data-user="Jaya">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=jaya_user" alt="Jaya" class="user-avatar-img">
                    <span class="user-name">Jaya</span>
                </button>
                <button class="user-btn" data-user="Fiona">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=fiona_user" alt="Fiona" class="user-avatar-img">
                    <span class="user-name">Fiona</span>
                </button>
                <button class="user-btn" data-user="Lucy">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=lucy_user" alt="Lucy" class="user-avatar-img">
                    <span class="user-name">Lucy</span>
                </button>
                <button class="user-btn" data-user="Cece">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=cece_user" alt="Cece" class="user-avatar-img">
                    <span class="user-name">Cece</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Chat Screen - Apple Messages Style -->
    <div id="chatScreen" class="screen">
        <div class="chat-wrapper">
            <!-- Header -->
            <div class="messages-header">
                <div class="header-left">
                    <button class="menu-btn" id="menuBtn" title="Menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
                <div class="header-center">
                    <h1>JFCD</h1>
                </div>
                <div class="header-right">
                    <button class="avatar-btn" title="Change avatar">✨</button>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <p>No messages yet</p>
                </div>
            </div>

            <!-- Message Input -->
            <div class="message-input-area">
                <form id="messageForm" class="message-form">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="iMessage"
                        autocomplete="off"
                        maxlength="500"
                    >
                    <button type="submit" class="send-btn" title="Send">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M2 10L18 2L10 18L2 10Z" fill="currentColor"/>
                        </svg>
                    </button>
                </form>
            </div>

            <!-- Current User Info Bar -->
            <div class="user-info-bar">
                <div class="user-avatar-small" id="currentUserAvatar">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=jaya_user" alt="User" class="avatar-img-small">
                </div>
                <span class="user-name-display" id="currentUserName">Jaya</span>
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </div>
        </div>
    </div>

    <!-- Hamburger Menu -->
    <div id="hamburgerMenu" class="hamburger-menu">
        <div class="menu-backdrop"></div>
        <div class="menu-content">
            <div class="menu-header">
                <h2>Switch User</h2>
                <button class="close-menu-btn" id="closeMenuBtn">&times;</button>
            </div>
            <div class="menu-users">
                <button class="menu-user-item" data-user="Jaya">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=jaya_user" alt="Jaya" class="menu-avatar-img">
                    <span>Jaya</span>
                    <span class="checkmark" id="check-Jaya">✓</span>
                </button>
                <button class="menu-user-item" data-user="Fiona">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=fiona_user" alt="Fiona" class="menu-avatar-img">
                    <span>Fiona</span>
                    <span class="checkmark" id="check-Fiona">✓</span>
                </button>
                <button class="menu-user-item" data-user="Lucy">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=lucy_user" alt="Lucy" class="menu-avatar-img">
                    <span>Lucy</span>
                    <span class="checkmark" id="check-Lucy">✓</span>
                </button>
                <button class="menu-user-item" data-user="Cece">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=cece_user" alt="Cece" class="menu-avatar-img">
                    <span>Cece</span>
                    <span class="checkmark" id="check-Cece">✓</span>
                </button>
            </div>
            <div class="menu-divider"></div>
            <div class="menu-settings">
                <button class="menu-notifications-btn" id="menuNotificationsBtn">
                    <span id="notificationStatus">🔔 Enable Notifications</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Avatar Picker Modal -->
    <div id="avatarModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Choose Avatar</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="avatar-grid">
                <button class="avatar-option" data-avatar="thumbs">
                    <img src="https://api.dicebear.com/10.x/thumbs/svg?bodyProbability=100&seed=avatar1" alt="Style 1">
                </button>
                <button class="avatar-option" data-avatar="avataaars">
                    <img src="https://api.dicebear.com/10.x/avataaars/svg?bodyProbability=100&seed=avatar2" alt="Style 2">
                </button>
                <button class="avatar-option" data-avatar="big-ears">
                    <img src="https://api.dicebear.com/10.x/big-ears/svg?bodyProbability=100&seed=avatar3" alt="Style 3">
                </button>
                <button class="avatar-option" data-avatar="big-smile">
                    <img src="https://api.dicebear.com/10.x/big-smile/svg?bodyProbability=100&seed=avatar4" alt="Style 4">
                </button>
                <button class="avatar-option" data-avatar="bottts">
                    <img src="https://api.dicebear.com/10.x/bottts/svg?bodyProbability=100&seed=avatar5" alt="Style 5">
                </button>
                <button class="avatar-option" data-avatar="croodles">
                    <img src="https://api.dicebear.com/10.x/croodles/svg?bodyProbability=100&seed=avatar6" alt="Style 6">
                </button>
                <button class="avatar-option" data-avatar="lorelei">
                    <img src="https://api.dicebear.com/10.x/lorelei/svg?bodyProbability=100&seed=avatar7" alt="Style 7">
                </button>
                <button class="avatar-option" data-avatar="micah">
                    <img src="https://api.dicebear.com/10.x/micah/svg?bodyProbability=100&seed=avatar8" alt="Style 8">
                </button>
                <button class="avatar-option" data-avatar="miniavs">
                    <img src="https://api.dicebear.com/10.x/miniavs/svg?bodyProbability=100&seed=avatar9" alt="Style 9">
                </button>
                <button class="avatar-option" data-avatar="notionists">
                    <img src="https://api.dicebear.com/10.x/notionists/svg?bodyProbability=100&seed=avatar10" alt="Style 10">
                </button>
                <button class="avatar-option" data-avatar="personas">
                    <img src="https://api.dicebear.com/10.x/personas/svg?bodyProbability=100&seed=avatar11" alt="Style 11">
                </button>
                <button class="avatar-option" data-avatar="pixel-art">
                    <img src="https://api.dicebear.com/10.x/pixel-art/svg?bodyProbability=100&seed=avatar12" alt="Style 12">
                </button>
                <button class="avatar-option" data-avatar="rings">
                    <img src="https://api.dicebear.com/10.x/rings/svg?bodyProbability=100&seed=avatar13" alt="Style 13">
                </button>
                <button class="avatar-option" data-avatar="shapes">
                    <img src="https://api.dicebear.com/10.x/shapes/svg?bodyProbability=100&seed=avatar14" alt="Style 14">
                </button>
                <button class="avatar-option" data-avatar="adventurer">
                    <img src="https://api.dicebear.com/10.x/adventurer/svg?bodyProbability=100&seed=avatar15" alt="Style 15">
                </button>
                <button class="avatar-option" data-avatar="fun-emoji">
                    <img src="https://api.dicebear.com/10.x/fun-emoji/svg?bodyProbability=100&seed=avatar16" alt="Style 16">
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
